 <div class="dialog-container"> 
     <div class="dialog-header items-center flex flex-col"> 
         <div 
             mat-dialog-title 
             class="w-full flex justify-between px-6 items-center border-b border-slate-300 h-15"> 
             <span class="text-3xl font-medium text-slate-500 w-full"> 
                 ចាកចេញ 
             </span> 
             <button 
                 class="helpers-mat-button-sm" 
                 [mat-dialog-close]="false" 
                 mat-icon-button> 
                 <mat-icon 
                     class="icon-size-6" 
                     svgIcon="heroicons_outline:x-mark"/> 
             </button> 
         </div> 
     </div>

    <div
        class="flex cursor-pointer items-center gap-y-3 text-base p-4 flex-col">
        <div class="flex w-full h-14 gap-x-2 justify-evenly">
            <div class="border border-b-[#CBD5E1] rounded-xl flex items-center w-full">
                <button class="min-w-10 max-w-10 pl-1 h-10 flex items-center justify-center hover:opacity-[0.96] transition-all">
                    <mat-icon
                        class="icon-size-6 text-slate-500"
                        svgIcon="heroicons_outline:magnifying-glass">
                    </mat-icon>
                </button>
                <input placeholder="ស្វែងរក" class="w-full pr-3 h-10" (keyup.enter)="showMoveOutData()" [(ngModel)]="search"/>
            </div>

            <mat-form-field
                class="flex justify-between cursor-pointer items-center dark:bg-slate-700 rounded-lg min-w-[100px]">
                <mat-label>តំបន់</mat-label>
                <mat-select (selectionChange)="onZoneChange($event.value)">
                    <mat-option 
                        *ngFor="let type of zoneType" 
                        [value]="type.value">
                        {{type.name}}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>


        <!-- if no data -->
        <div *ngIf="moveOutData?.length === 0 && !isLoading">
            <div
                class="flex flex-col justify-center items-center h-full">
                <mat-icon
                    class="text-gray-400"
                    svgIcon="toc">
                </mat-icon>
                <span class="text-2xl text-gray-500 mt-2"
                    >គ្មានទិន្នន័យ</span
                >
            </div>
        </div>

        <ng-container *ngIf="isLoading, else completed">
            <div class="flex flex-col gap-8 justify-center items-center h-full">
                <mat-spinner [diameter]="64" [mode]="'indeterminate'"></mat-spinner>
                <span class="text-slate-500 text-3xl font-semibold">កំពុងទាញយកទិន្នន័យ...</span>
            </div>
        </ng-container>

        <ng-template #completed>
        <div *ngFor="let data of moveOutData"
            class="text-md dark:bg-gray-900 flex w-full h-[68px] rounded-xl justify-between border border-[#CBD5E1] items-center">
            
            <div class="flex flex-row w-[120px] items-center gap-2 pl-3 border-r border-[#CBD5E1]">
                <mat-icon class="icon-size-7 md:icon-size-8" matSuffix svgIcon="mat_outline:door_front"></mat-icon>
                <div class="flex flex-col items-center text-md">
                    <span class="text-md">{{data?.code}}</span>
                    <span class="text-md text-[#64748B]">{{data?.type}}</span>
                </div>
            </div>

            <div class="flex flex-col items-center w-[160px] border-r border-[#CBD5E1]">
                <div class="h-full items-center">
                    <span class="w-auto font-normal flex gap-2 text-base">
                        <img
                            class="w-12 h-12 items-center rounded-full"
                            [src]="fileUrl+data?.transactions[0]?.renter?.avatar"
                            alt="avatar"/>
                        <div
                            class="flex flex-col justfiy-between w-full h-full text-center">
                            <span class="text-md">{{ data?.transactions[0]?.renter?.name}}</span>
                            <span class="text-md text-slate-500">
                                {{ data?.transactions[0]?.renter?.phone }}
                            </span>
                        </div>
                    </span>
                </div>
            </div>

            <div class="flex-1 w-auto items-end flex pl-3 text-[#64748B] justify-between">
                <span class="text-md">កាលបរិច្ចេទ</span>
                <span class="text-md">{{data?.transactions[0]?.moveIn}}</span>
            </div>

            <div class="items-center pr-1 gap-1">
                <button mat-icon-button [matMenuTriggerFor]="menu">
                    <mat-icon class="icon-size-6" svgIcon="mat_outline:more_vert"></mat-icon>
                </button>
                <mat-menu #menu="matMenu">
                    <button mat-menu-item (click)="openConfirmDialog(data)">
                        <mat-icon svgIcon="mdi:logout"></mat-icon>
                        <span class="text-lg">ចាកចេញ</span>
                    </button>
                </mat-menu>
            </div>
        </div>
        </ng-template>
</div>
