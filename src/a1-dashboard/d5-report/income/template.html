<div class="dialog-container">
    <!-- Header -->
    <div class="dialog-header items-center flex flex-col">
        <div
            mat-dialog-title
            class="w-full flex justify-between px-6 items-center border-b border-slate-300 h-15">
            <span class="text-3xl font-medium text-slate-500 w-full">
                ទាញយករបាយការណ៍ចំណូល
            </span>
            <button
                class="helpers-mat-button-sm"
                [mat-dialog-close]="false"
                mat-icon-button>
                <mat-icon
                    class="icon-size-6"
                    svgIcon="heroicons_outline:x-mark"/>
            </button>
        </div>
    </div>


    <div class="p-4">
        <div>
            <form
              class="flex flex-col gap-y-2 md-form-field-appearance-outline"

                <mat-form-field 
                    class="w-full flex justify-center cursor-pointer items-center dark:bg-slate-700 rounded-lg min-w-[100px]">
                    <mat-label>ឆ្នាំ</mat-label>
                    <mat-select formControlName="year">
                        <mat-option *ngFor="let year of yearOption" [value]="year">
                            {{year}}
                        </mat-option>
                    </mat-select>
                </mat-form-field>

                <mat-form-field 
                    class="w-full flex justify-center cursor-pointer items-center dark:bg-slate-700 rounded-lg min-w-[100px]">
                    <mat-label>ខែ</mat-label>
                    <mat-select formControlName="month">
                        <mat-option *ngFor="let month of monthOption" [value]="month.value">
                            {{month.month}}
                        </mat-option>
                    </mat-select>
                </mat-form-field>

                <mat-form-field 
                    class="w-full flex justify-center cursor-pointer items-center dark:bg-slate-700 rounded-lg min-w-[100px]">
                    <mat-label>ថ្ងៃ</mat-label>
                    <input type="number" matInput formControlName="day">
                </mat-form-field>

                    <mat-form-field 
                        class="flex h-[56px] justify-center cursor-pointer items-center dark:bg-slate-700 rounded-lg min-w-[100px]">
                        <mat-label>តំបន់</mat-label>
                        <mat-select 
                            formControlName="zone">
                            <mat-option *ngFor="let type of zoneType" [value]="type.value">
                                {{type.name}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>


                    <div class="ml-auto py-2 justify-end">
                        <button class="bg-blue-600 text-white rounded-xl px-4 py-2 disabled:bg-gray-400 disabled:cursor-not-allowed"
                        (click)="getReportIncome()" [disabled]="isLoading">
                            ទាញយក
                        </button>   
                    </div>

                </form>

    </div>
</div>
