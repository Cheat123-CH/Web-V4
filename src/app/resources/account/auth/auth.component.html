<div class="flex flex-col sm:flex-row items-center md:items-start sm:justify-center md:justify-start flex-auto min-w-0 relative min-h-[100dvh]">
    <div class="flex justify-center items-center">
        <div class="w-full px-4 py-8 sm:w-auto sm:p-12 md:p-16">
            <div class="mx-auto w-full max-w-80 sm:mx-0 sm:w-80">

                <!-- Logo  and title-->
                <div>
                    <div class="flex flex-col justify-center items-center">
                        <img class="w-40 flex" src="images/logo/mme.jpg" />
                        <img class="w-64 mt-5" src="images/logo/kce-text.png" alt="">
                    </div>
                </div>

                <div>
                    <div class="flex flex-col justify-center items-center mt-5">
                        <p class="text-[18px] text-[#0e2049]">ចូលគណនីរបស់អ្នក</p>
                    </div>
                </div>

                <!-- Alert Message -->
                @if (showAlert) {
                <helper-alert class="-mb-4 mt-8" [appearance]="'outline'" [showIcon]="false" [type]="alert.type"
                    [@shake]="alert.type === 'error'">
                    {{ alert.message }}
                </helper-alert>
                }

                <!-- Sign in form -->
                <form class="mt-8 md-form-field-appearance-outline" [formGroup]="signInForm" #signInNgForm="ngForm">
                    <!-- username field -->
                    <mat-form-field class="w-full thick-border">
                        <mat-label>លេខទូរស័ព្ទ</mat-label>
                        <input id="username" matInput [formControlName]="'username'" />
                        @if (signInForm.get('username').hasError('required')) {
                        <mat-error> សូមបញ្ចូលលេខទូរស័ព្ទ </mat-error>
                        }
                        @if (signInForm.get('username').hasError('username')) {
                        <mat-error>
                            Please enter a valid username address
                        </mat-error>
                        }
                        <button mat-icon-button type="button" matSuffix>
                            <mat-icon class="icon-size-5 " [svgIcon]="'mat_outline:phone_android'"></mat-icon>
                        </button>

                    </mat-form-field>

                    <!-- Password field -->
                    <mat-form-field class="w-full">
                        <mat-label>Password</mat-label>
                        <input id="password" matInput type="password" [formControlName]="'password'" #passwordField />
                        <button mat-icon-button type="button" (click)="
                                    passwordField.type === 'password'
                                        ? (passwordField.type = 'text')
                                        : (passwordField.type = 'password')
                                " matSuffix>
                            @if (passwordField.type === 'password') {
                            <mat-icon class="icon-size-5" [svgIcon]="'heroicons_solid:eye'"></mat-icon>
                            }
                            @if (passwordField.type === 'text') {
                            <mat-icon class="icon-size-5" [svgIcon]="'heroicons_solid:eye-slash'"></mat-icon>
                            }
                        </button>
                        <mat-error> សូមបញ្ចូលលេខសំង </mat-error>
                    </mat-form-field>

                    <!-- Submit button -->
                    <button class="helper-mat-button-large mt-5 w-full bg-[#09235f] rounded-[40px] text-center"
                        mat-flat-button [color]="'primary'" [disabled]="signInForm.disabled" (click)="signIn()">
                        @if (!signInForm.disabled) {
                        <span class="text-white text-center"> ចូលប្រព័ន្ធ </span>
                        }
                        @if (signInForm.disabled) {
                        <mat-progress-spinner [diameter]="24" [mode]="'indeterminate'"></mat-progress-spinner>
                        }
                    </button>
                </form>
            </div>
        </div>
    </div>
    <div
        class="relative hidden h-full flex-auto items-center justify-center overflow-hidden bg-gray-800 p-16 dark:border-l md:flex lg:px-28">
        <!-- Background -->
        <!-- Rings -->

        <svg class="absolute inset-0 pointer-events-none" viewBox="0 0 960 540" width="100%" height="100%"
            preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
            <g class="text-gray-700 opacity-25" fill="none" stroke="currentColor" stroke-width="100">
                <circle r="234" cx="196" cy="23"></circle>
                <circle r="234" cx="790" cy="491"></circle>
            </g>
        </svg>
        <!-- Dots -->

        <svg class="absolute -top-16 -right-16 text-gray-700" viewBox="0 0 220 192" width="220" height="192"
            fill="none">
            <defs>
                <pattern id="837c3e70-6c3a-44e6-8854-cc48c737b659" x="0" y="0" width="20" height="20"
                    patternUnits="userSpaceOnUse">
                    <rect x="0" y="0" width="4" height="4" fill="currentColor"></rect>
                </pattern>
            </defs>
            <rect width="220" height="192" fill="url(#837c3e70-6c3a-44e6-8854-cc48c737b659)"></rect>
        </svg>
    </div>
</div>
