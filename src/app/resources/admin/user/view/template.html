<!-- Loading State -->
<div *ngIf="isLoading" class="w-full px-6 pt-5">
    <div>Loading...</div>
</div>

<!-- Main Section -->
<div *ngIf="!isLoading" class="out-create-section md-form-field-appearance-outline">

    <!-- Dialog Title -->
    <div mat-dialog-title class="min-h-14 max-h-14 flex gap-2 justify-between items-center py-2 pl-5 pr-2.5 border-b">
        <div class="flex flex-1 items-center text-slate-500">
            <h1 class="text-3xl">{{element.name}}</h1>
        </div>

        <!-- Close Button -->
        <div class="flex items-center cursor-pointer pl-2">
            <button mat-icon-button (click)="closeDialog()">
                <mat-icon class="-mb-0.5" [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="out-create-body px-4 pb-5" *ngIf="!isLoading && element">
        <div class="flex flex-col items-center gap-6 mt-10">
            <div class="w-full flex justify-between overflow-hidden">
                <div></div>
                <img class="border-2 w-32 h-32 border-blue-500 object-cover rounded-full -mr-10"
                    [src]="fileUrl + element?.avatar" alt="Profile Image">
                <button mat-icon-button (click)="update(element)">
                    <mat-icon class="icon-size-6" svgIcon="mdi:square-edit-outline"></mat-icon>
                </button>
            </div>

            <div class="flex flex-col justify-center max-w-50 items-center">
                <span class="text-gray-800 text-2xl dark:text-gray-300">{{element?.name}}</span>
                <div class="flex gap-2">
                    <span class="text-gray-500 dark:text-gray-300">{{element?.role?.[0]?.role?.name}}</span>
                    <span class="text-gray-500 dark:text-gray-300" *ngIf="element.role.length>1"> |
                        {{element?.role?.[1]?.role?.name}}</span>
                </div>
            </div>

            <div class="flex justify-between gap-14">
                <div class="flex flex-row justify-center gap-2 max-w-50">
                    <mat-icon svgIcon="mdi:cellphone"></mat-icon>
                    <span class="text-gray-500">{{element?.phone}}</span>
                </div>
                <div class="flex flex-row justify-center gap-2">
                    <mat-icon svgIcon="mdi:email-outline"></mat-icon>
                    <span class="text-gray-500">{{element?.email}}</span>
                </div>
            </div>

            <div class="flex flex-row justify-center max-w-50">
                <mat-icon svgIcon="mdi:calendar-blank-outline"></mat-icon>
                <span class="text-gray-500 ml-2">{{element?.created_at | date: 'dd-LL-YYY'}}</span>
            </div>
        </div>
    </div>
</div>
