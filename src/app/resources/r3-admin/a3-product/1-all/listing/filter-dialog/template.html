<div mat-dialog-title class="w-full flex justify-between">
    <span class="w-full text-2xl font-medium">ច្រោះទិន្ន័យ</span>
    <button (click)="closeDialog()" mat-icon-button>
        <mat-icon svgIcon="mdi:close" />
    </button>
</div>

    <form [formGroup]="form" class="md-form-field-appearance-outline">

        <mat-form-field appearance="outline" class="w-full">
            <mat-label>ប្រភេទផលិតផល</mat-label>
            <mat-icon class="icon-size-5" matPrefix [svgIcon]="'mdi:building-line'"></mat-icon>
            <mat-select formControlName="type_id" placeholder="ជ្រើសរើសប្រភេទផលិតផល">
                <mat-option *ngFor=" let item of setup?.type_id" [value]=" item.id ">
                    {{ item.name }}

            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">

            <mat-select formControlName="user" placeholder="ជ្រើសរើសអ្នកបញ្ចូលទិន្នន័យ">
                <mat-option *ngFor=" let item of setup?.users" [value]=" item.id ">
                    {{ item.name }}
                </mat-option>
            </mat-select>
        </mat-form-field>

    </form>
</mat-dialog-content>

<mat-dialog-actions class="flex items-center justify-end">
    <button class="text-slate-800 gap-1" mat-stroked-button (click)="reset()">
        <mat-icon mat-icon-button [svgIcon]="'mdi:refresh'"/>
        <span>សម្អាត</span>
    </button>
    <button class="bg-blue-900 text-white gap-1" mat-flat-button (click)="submit()">
        <mat-icon mat-icon-button class="" [svgIcon]="'heroicons_outline:magnifying-glass'"/>
        <span>ស្វែងរក</span>
    </button>
</mat-dialog-actions>
